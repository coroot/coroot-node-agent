name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  GO:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-22.04, ubuntu-22.04-arm]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.9'
      - run: sudo apt update && sudo apt install -y libsystemd-dev
      - name: gofmt -l .
        run: files=$(gofmt -l .); if [[ -n "$files" ]]; then echo "$files"; exit 1; fi
      - name: goimports -l .
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          files=$(goimports -l .); if [[ -n "$files" ]]; then echo "$files"; exit 1; fi
      - run: go vet ./...
      - run: go test ./...
      - run: go build -mod=readonly .

  Windows:
    runs-on: windows-latest
    env:
      CGO_ENABLED: '0'
    steps:
      # The repo's Linux cgroup test fixtures have very long paths that exceed
      # Windows' 260-char MAX_PATH, breaking checkout unless long paths are on.
      - name: Enable Git long paths
        run: git config --system core.longpaths true
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.9'
      - name: vet
        run: go vet -unsafeptr=false ./windows/... ./cmd/coroot-windows-agent
      - name: test
        run: go test ./windows/... ./apptype/... ./metrics/...
      - name: build
        run: go build -mod=readonly ./cmd/coroot-windows-agent
