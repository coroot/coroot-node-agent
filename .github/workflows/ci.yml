name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  Linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.9'
      - run: sudo apt update && sudo apt install -y libsystemd-dev
      - name: gofmt -l .
        run: files=$(gofmt -l .); if [[ -n "$files" ]]; then echo "$files"; exit 1; fi
      - name: goimports -l .
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          files=$(goimports -l .); if [[ -n "$files" ]]; then echo "$files"; exit 1; fi
      - run: go vet ./...
      - run: go test ./...
      - run: go build -mod=readonly .

  Windows:
    runs-on: windows-latest
    env:
      WINDOWS_TEST_PACKAGES: ". ./containers ./etwtracer ./logs ./node ./proc ./tools/metriclabels"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.9'
      - shell: pwsh
        run: |
          $packages = $env:WINDOWS_TEST_PACKAGES -split " "
          go test @packages
      - run: go build -mod=readonly ./...
