name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  GO:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-22.04, ubuntu-22.04-arm]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.9'
      - run: sudo apt update && sudo apt install -y libsystemd-dev
      - name: gofmt -l .
        run: files=$(gofmt -l .); if [[ -n "$files" ]]; then echo "$files"; exit 1; fi
      - name: goimports -l .
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          files=$(goimports -l .); if [[ -n "$files" ]]; then echo "$files"; exit 1; fi
      - run: go vet ./...
      - run: go test ./...
      - run: go build -mod=readonly .

  Windows:
    runs-on: windows-latest
    env:
      CGO_ENABLED: '0'
      WINDOWS_TEST_PACKAGES: ". ./containers ./etwtracer ./logs ./node ./proc ./tools/metriclabels ./windows/... ./apptype/... ./metrics/..."
    steps:
      - name: Enable Git long paths
        shell: pwsh
        run: git config --global core.longpaths true
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.9'
      - name: vet
        run: go vet -unsafeptr=false ./windows/... ./cmd/coroot-windows-agent
      - name: test
        shell: pwsh
        run: |
          $packages = $env:WINDOWS_TEST_PACKAGES -split " "
          go test @packages
      - name: build
        run: go build -mod=readonly ./...
