name: Release

on:
  release:
    types: [created]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  WIX_VERSION: 3.14.1

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: normalize image name
        id: image
        run: echo "ref=${REGISTRY}/${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.9'

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}

      - name: extract amd64 binary from the image
        run: |
          docker create --platform linux/amd64 --name amd64 ${{ steps.image.outputs.ref }}:${{ steps.meta.outputs.version }} &&
          docker cp amd64:/usr/bin/coroot-node-agent /tmp/coroot-node-agent-amd64

      - name: extract arm64 binary from the image
        run: |
          docker create --platform linux/arm64 --name arm64 ${{ steps.image.outputs.ref }}:${{ steps.meta.outputs.version }} &&
          docker cp arm64:/usr/bin/coroot-node-agent /tmp/coroot-node-agent-arm64

      - name: upload amd64 binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: /tmp/coroot-node-agent-amd64
          asset_name: coroot-node-agent-amd64
          asset_content_type: application/octet-stream

      - name: upload arm64 binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: /tmp/coroot-node-agent-arm64
          asset_name: coroot-node-agent-arm64
          asset_content_type: application/octet-stream

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Enable Git long paths
        shell: pwsh
        run: git config --global core.longpaths true

      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.9'

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}

      - name: build windows amd64 binary
        shell: pwsh
        run: |
          go build -mod=readonly -ldflags "-X 'github.com/coroot/coroot-node-agent/flags.Version=${{ steps.meta.outputs.version }}'" -o "$env:RUNNER_TEMP\coroot-node-agent-windows-amd64.exe" .

      - name: build windows amd64 msi
        shell: pwsh
        run: |
          .\scripts\build-windows-msi.ps1 `
            -BinaryPath "$env:RUNNER_TEMP\coroot-node-agent-windows-amd64.exe" `
            -Version "${{ steps.meta.outputs.version }}" `
            -OutputDir "$env:RUNNER_TEMP" `
            -WixVersion "${{ env.WIX_VERSION }}"

      - name: upload windows amd64 binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ runner.temp }}\coroot-node-agent-windows-amd64.exe
          asset_name: coroot-node-agent-windows-amd64.exe
          asset_content_type: application/octet-stream

      - name: upload windows amd64 msi
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ runner.temp }}\coroot-node-agent-windows-amd64.msi
          asset_name: coroot-node-agent-windows-amd64.msi
          asset_content_type: application/x-msi

  publish-release-metadata:
    runs-on: ubuntu-22.04
    needs:
      - build-linux
      - build-windows
    permissions:
      contents: write

    steps:
      - uses: actions/github-script@v7
        env:
            RELEASE_ID: ${{ github.event.release.id }}
        with:
          script: |
            const { RELEASE_ID } = process.env
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: `${RELEASE_ID}`,
              prerelease: false,
              make_latest: true
            })  
          
