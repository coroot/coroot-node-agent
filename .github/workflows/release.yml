name: Release

on:
  release:
    types: [created]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  WIX_VERSION: 3.14.1

jobs:
  linux:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-22.04
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-22.04-arm
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Normalize image name
        id: image
        run: echo "ref=${REGISTRY}/${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          outputs: type=image,name=${{ steps.image.outputs.ref }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

      - name: Extract the release binary from the image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cid=$(docker create --platform ${{ matrix.platform }} ${{ steps.image.outputs.ref }}@${DIGEST})
          docker cp "$cid:/usr/bin/coroot-node-agent" "/tmp/coroot-node-agent-${{ matrix.arch }}"
          docker rm "$cid"

      - name: Upload binary to the release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/coroot-node-agent-${{ matrix.arch }}

  merge:
    needs: linux
    runs-on: ubuntu-22.04
    permissions:
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Normalize image name
        id: image
        run: echo "ref=${REGISTRY}/${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}

      - name: Create and push the multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ steps.image.outputs.ref }}@sha256:%s ' *)

      - name: Inspect the pushed image
        run: docker buildx imagetools inspect ${{ steps.image.outputs.ref }}:${{ steps.meta.outputs.version }}

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Enable Git long paths
        shell: pwsh
        run: git config --global core.longpaths true

      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.9'

      - name: Build Windows amd64 binary
        shell: pwsh
        env:
          GOOS: windows
          GOARCH: amd64
        run: |
          go build -mod=readonly -ldflags "-X 'github.com/coroot/coroot-node-agent/flags.Version=${{ github.event.release.tag_name }}'" -o "$env:RUNNER_TEMP\coroot-node-agent-windows-amd64.exe" .

      - name: Build Windows amd64 MSI
        shell: pwsh
        run: |
          .\scripts\build-windows-msi.ps1 `
            -BinaryPath "$env:RUNNER_TEMP\coroot-node-agent-windows-amd64.exe" `
            -Version "${{ github.event.release.tag_name }}" `
            -OutputDir "$env:RUNNER_TEMP" `
            -WixVersion "${{ env.WIX_VERSION }}"

      - name: Upload Windows artifacts to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ runner.temp }}/coroot-node-agent-windows-amd64.exe
            ${{ runner.temp }}/coroot-node-agent-windows-amd64.msi

  finalize:
    needs: [linux, merge, build-windows]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ github.event.release.id }}
        with:
          script: |
            const { RELEASE_ID } = process.env
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: `${RELEASE_ID}`,
              prerelease: false,
              make_latest: true
            })
